name: Garmin Sync

on:
  schedule:
    # Every 4 hours. Daily wellness/sleep/HRV only update a few times a day and activities
    # sync whenever you finish one, so 30-min polling was overkill and multiplied the fresh-
    # login / 429 rate-limit risk on shared GitHub IPs. 6 runs/day is plenty.
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # Persist the garth session between runs so we avoid a fresh login (and its rate-limit /
      # MFA risk) on every run. Restore the most recent session by prefix; the save step below
      # runs ONLY when the sync confirmed a valid session, so a rate-limited or failed run can
      # never poison the cache with a partial/cleared .garth dir.
      - name: Restore garth session
        uses: actions/cache/restore@v4
        with:
          path: .garth
          key: garth-session-none  # intentionally never an exact hit -> always use restore-keys
          restore-keys: |
            garth-session-

      - name: Run sync
        id: sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          GARTH_HOME: ${{ github.workspace }}/.garth
          # Optional: also push synced data into Supabase (see docs/SUPABASE_SETUP.md "Garmin
          # power-up"). Leave these two repo secrets unset to skip Supabase entirely and only
          # write data/*.json as before.
          SUPABASE_INGEST_URL: ${{ secrets.SUPABASE_INGEST_URL }}
          GARMIN_INGEST_TOKEN: ${{ secrets.GARMIN_INGEST_TOKEN }}
          # Manual runs do the wide 14-day catch-up sweep; scheduled runs stay lean (3 days).
          FULL_BACKFILL: ${{ github.event_name == 'workflow_dispatch' }}
        run: python scripts/garmin_sync.py

      # Only cache the session when the sync confirmed a valid one — never a partial/cleared dir.
      - name: Save garth session
        if: steps.sync.outputs.session_saved == 'true'
        uses: actions/cache/save@v4
        with:
          path: .garth
          key: garth-session-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Commit changes
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "garmin-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/garmin_activities.json data/garmin_wellness.json data/garmin_health.json
          git diff --cached --quiet || git commit -m "chore: sync Garmin data [skip ci]"
          git push
