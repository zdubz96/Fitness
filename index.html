<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>AI Trainer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app"></div>
  <script type="module" src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js", { updateViaCache: "none" }).then((reg) => {
          // Check for a new version on every launch.
          reg.update();
          // When a freshly-installed worker takes over, reload once so the new code shows
          // immediately instead of on some later visit.
          let refreshing = false;
          navigator.serviceWorker.addEventListener("controllerchange", () => {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });
          reg.addEventListener("updatefound", () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener("statechange", () => {
              if (nw.state === "installed" && navigator.serviceWorker.controller) {
                nw.postMessage("skip-waiting");
              }
            });
          });
        }).catch((e) => console.warn("SW registration failed", e));
      });
    }
  </script>
</body>
</html>
